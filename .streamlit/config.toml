[theme]
# Paleta cálida y accesible — orientada al ciudadano, no a tech ni a gobierno
primaryColor             = "#ca9f7f"   # naranja tostado — acento, botones, links
backgroundColor          = "#ffffff"   # blanco — valor base de Streamlit (no afecta al fondo de página)
secondaryBackgroundColor = "#F5EAD8"   # arena clara — sidebar, expanders nativos de Streamlit
textColor                = "#2C2416"   # carbón cálido — texto principal
pageBackgroundColor      = "#EDD9C0"   # arena cálida — fondo de página (aplicado via CSS en _styles.py)
containerBackgroundColor = "#f7ceceff"   # blanco — tarjetas, panel de detalle, cards de inicio
inputBackgroundColor     = "#FFFFFF"   # blanco — campos de texto, inputs

[browser]
gatherUsageStats = false
